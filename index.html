<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Muhammad Ali — Developer</title>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');

  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#000}

  #canvas-bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}

  #app{position:fixed;inset:0;z-index:10;overflow:hidden;font-family:'Space Mono',monospace}

  nav{position:absolute;top:0;left:0;right:0;padding:24px 40px;display:flex;justify-content:space-between;align-items:center;z-index:100}
  .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;color:#fff}
  .logo span{color:#7DF9C2}

  nav ul{list-style:none;display:flex;gap:32px}
  nav ul li a{color:rgba(255,255,255,0.55);text-decoration:none;font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer}
  nav ul li a.active,nav ul li a:hover{color:#7DF9C2}

  .section{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:.5s;padding:80px 40px}
  .section.visible{opacity:1;pointer-events:all}

  #hero{flex-direction:column;align-items:flex-start;padding-left:10%}

  h1{font-family:'Syne';font-size:clamp(40px,7vw,88px);color:#fff;line-height:.95}
  h1 .dim{color:rgba(255,255,255,.2)}

  .subtitle{margin-top:20px;color:rgba(255,255,255,.5);max-width:360px}

  .btn-primary{background:#7DF9C2;color:#000;padding:12px 24px;border:none;cursor:pointer}
  .btn-ghost{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.2);padding:12px 24px;cursor:pointer}

  /* ABOUT */
  #about{gap:60px}
  .avatar-inner{width:140px;height:140px;border-radius:50%;background:#111;color:#7DF9C2;display:flex;align-items:center;justify-content:center;font-size:40px}

  /* SKILLS */
  .skill-fill{height:100%;background:#7DF9C2;width:0;transition:1s}

  /* CONTACT */
  #contact h2{font-family:'Syne';font-size:60px;color:#fff}
  #contact h2 span{color:#7DF9C2}

  .contact-link{color:#fff;text-decoration:none;border:1px solid rgba(255,255,255,.2);padding:12px 20px;display:inline-flex;gap:10px}

  /* cursor */
  #cursor,#cursor-ring{position:fixed;pointer-events:none;border-radius:50%;opacity:0}
  #cursor{width:10px;height:10px;background:#7DF9C2;transform:translate(-50%,-50%)}
  #cursor-ring{width:36px;height:36px;border:1px solid #7DF9C2;transform:translate(-50%,-50%)}

  /* MOBILE FIX */
  @media(max-width:700px){
    body,html{overflow-y:auto}
    #app{position:relative}
    .section{position:relative;min-height:100vh}
    nav ul{display:none}
  }
</style>
</head>

<body>

<canvas id="canvas-bg"></canvas>
<div id="cursor"></div>
<div id="cursor-ring"></div>

<div id="app">

<nav>
  <div class="logo"><span>//</span> Muhammad Ali</div>
  <ul>
    <li><a onclick="goTo('hero')" class="active">Home</a></li>
    <li><a onclick="goTo('about')">About</a></li>
    <li><a onclick="goTo('skills')">Skills</a></li>
    <li><a onclick="goTo('contact')">Contact</a></li>
  </ul>
</nav>

<!-- HERO -->
<div class="section visible" id="hero">
  <h1>Muhammad<br><span class="dim">Ali</span></h1>
  <p class="subtitle">CS student in Naples, building and learning every day.</p>
  <div style="margin-top:30px">
    <button class="btn-primary" onclick="goTo('about')">About</button>
    <button class="btn-ghost" onclick="goTo('contact')">Contact</button>
  </div>
</div>

<!-- ABOUT -->
<div class="section" id="about">
  <div class="avatar-inner">MA</div>
  <div>
    <h2 style="color:#fff">Student. Builder.</h2>
    <p style="color:rgba(255,255,255,.5)">Computer Science student in Naples.</p>
  </div>
</div>

<!-- SKILLS -->
<div class="section" id="skills">
  <h2 style="color:#fff">Skills</h2>
  <div style="width:300px;margin-top:20px">
    <div>Python<div class="skill-fill" data-w="80"></div></div>
    <div>Java<div class="skill-fill" data-w="70"></div></div>
  </div>
</div>

<!-- CONTACT -->
<div class="section" id="contact">
  <h2>Say <span>Hello</span></h2>

  <a class="contact-link"
     href="mailto:alimuhammad10293847561@gmail.com">
     Email Me
  </a>

</div>

</div>

<script>

const sections=['hero','about','skills','contact'];
let current='hero';

const isMobile = window.innerWidth <= 700;

/* navigation */
window.goTo=function(id){
  sections.forEach(s=>{
    document.getElementById(s).classList.toggle('visible',s===id);
  });
  current=id;
}

/* SKILL ANIMATION */
function animate(){
  if(current==='skills'){
    document.querySelectorAll('.skill-fill').forEach(el=>{
      el.style.width=el.dataset.w+'%';
    });
  }
}

/* DESKTOP NAV ONLY */
if(!isMobile){

window.addEventListener('wheel',e=>{
  let i=sections.indexOf(current);
  if(e.deltaY>0 && i<sections.length-1) goTo(sections[i+1]);
  if(e.deltaY<0 && i>0) goTo(sections[i-1]);
},{passive:true});

window.addEventListener('touchstart',e=>{
  this.y=e.touches[0].clientY;
});

window.addEventListener('touchend',e=>{
  let dy=this.y-e.changedTouches[0].clientY;
  let i=sections.indexOf(current);
  if(dy>50 && i<sections.length-1) goTo(sections[i+1]);
  if(dy<-50 && i>0) goTo(sections[i-1]);
});

}

/* cursor */
window.addEventListener('mousemove',e=>{
  document.getElementById('cursor').style.left=e.clientX+'px';
  document.getElementById('cursor').style.top=e.clientY+'px';
  document.getElementById('cursor').style.opacity=1;
});

</script>

</body>
</html>
